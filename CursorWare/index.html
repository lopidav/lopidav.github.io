<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P High-Accuracy Cursors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif; cursor: crosshair; }
        
        .cursor-entity {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            will-change: transform, z-index;
            opacity: 1;
        }

        .cursor-sprite-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
        }

        .cursor-icon {
            position: absolute;
            width: 32px;
            height: 32px;
            top: -3px; 
            left: -10px; 
            transform-origin: 10px 3px; 
            overflow: visible; 
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5));
        }

        .facing-left { transform: rotate(-15deg); }

        /* Snappy, Slapstick Animations */
        .anim-hf { animation: highfive 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: 2px 19px; }
        @keyframes highfive {
            0% { transform: rotate(0deg) scale(1); }
            30% { transform: rotate(-45deg) scale(1.5); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .anim-slap-strike { animation: slapstrike 0.25s cubic-bezier(0.25, 1, 0.5, 1); transform-origin: 2px 19px; }
        @keyframes slapstrike {
            0% { transform: rotate(0deg) scale(1); }
            40% { transform: rotate(-60deg) scale(1.3); } /* Huge windup */
            60% { transform: rotate(45deg) translateX(10px) scale(1.1); } /* Instant snap forward */
            100% { transform: rotate(0deg) scale(1); }
        }

        /* Receive animation: no rotation, just scale up and bounce back */
        .anim-slap-receive { animation: slapreceive 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97); transform-origin: center center; }
        @keyframes slapreceive {
            0% { transform: scale(1); }
            40% { transform: scale(1.4); } /* Get bigger */
            100% { transform: scale(1); }
        }

        /* Effects */
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            20% { transform: translate(-50%, -80%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
        }

        @keyframes slapTextAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-15deg); }
            30% { opacity: 1; transform: translate(calc(-50% + var(--dx)*0.5), calc(-50% + var(--dy)*0.5)) scale(1.2) rotate(5deg); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(0deg); }
        }

        @keyframes rainbowText {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .cursor-label {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }
        body.labels-visible .cursor-label { opacity: 1; }

        #lobby { transition: opacity 0.2s ease; }
        .hidden-fade { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- LOBBY UI -->
    <div id="lobby" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-[60]">
        <div class="bg-slate-800 p-8 rounded-xl shadow-2xl max-w-md w-full text-center border border-slate-700">
            <h1 class="text-3xl font-bold mb-2 text-indigo-400">High-Precision Party</h1>
            <p class="text-slate-400 mb-8 text-sm">Low-latency P2P synchronization.</p>

            <div id="loading-state" class="hidden text-indigo-400 font-semibold mb-4 animate-pulse">
                Connecting to PeerJS...
            </div>

            <div id="action-state">
                <button id="btn-host" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors mb-6 shadow-lg">
                    Create New Room
                </button>
                <div class="flex items-center my-4">
                    <div class="flex-grow border-t border-slate-600"></div>
                    <span class="px-3 text-slate-500 text-sm">OR</span>
                    <div class="flex-grow border-t border-slate-600"></div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="input-room-id" placeholder="Room ID..." class="flex-grow bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                    <button id="btn-join" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                        Join
                    </button>
                </div>
                <p id="error-msg" class="text-red-400 text-sm mt-3 h-4"></p>
            </div>
        </div>
    </div>

    <!-- PROMPT TO LOCK CURSOR -->
    <div id="click-prompt" style="display: none;" class="fixed inset-0 items-center justify-center bg-slate-900/40 z-[100] cursor-pointer">
        <div class="bg-indigo-600 px-6 py-3 rounded-full font-bold shadow-2xl animate-bounce mt-32">
            Click anywhere to start moving
        </div>
    </div>

    <!-- GAME UI -->
    <div id="game-ui" class="absolute inset-0 hidden pointer-events-none z-[110]">
        <div class="absolute top-4 left-4 bg-slate-800/90 backdrop-blur border border-slate-700 p-4 rounded-lg pointer-events-auto shadow-xl">
            <div class="flex items-center gap-2 mb-2">
                <code id="display-room-id" class="text-indigo-400 font-mono font-bold text-sm">...</code>
                <button id="btn-copy" class="p-1 hover:bg-slate-700 rounded transition-colors" title="Copy Room ID">
                    <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <svg id="icon-check" class="hidden text-emerald-400" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
            </div>
            <div class="text-xs text-slate-300 font-medium mb-1">
                <span id="player-count">1</span> Users Synced @ 60Hz
            </div>
            <div class="text-[10px] text-slate-500 mt-2 space-y-1">
                <div>[ESC] Release cursor</div>
                <div>[TAB] Show names</div>
                <div>[CLICK] High-five / Slap / Break Free</div>
                <div>[DRAG] Grab cursors</div>
            </div>
        </div>
    </div>

    <div id="cursor-container" class="absolute inset-0 pointer-events-none z-10"></div>

    <script>

        const PATH_JAZZ_HAND = "m 22.2121,4.2464771 c -1.195115,-0.69 -2.818835,-0.329489 -3.415064,0.9150636 L 16,11 h -0.5 l 0.618718,-8.5332639 c 0.0998,-1.3763868 -1.12,-2.49999998 -2.5,-2.49999998 -1.38,0 -2.400202,1.12361318 -2.5,2.49999998 L 10.5,11 H 10 L 7.4982996,4.0755247 C 7.029392,2.7776319 5.7694151,1.9505875 4.4364374,2.3077578 3.1034598,2.664928 2.1968682,4.0727766 2.6686705,5.3696199 c 0,0 2.0697685,4.9241201 2.3313295,6.4081271 C 5.261561,13.261754 5,14 5,14 L 4.5427872,13.9978 -0.01360504,13.105728 C -1.4051131,12.732875 -2.6457841,13.40008 -3.0212794,14.801448 l -0.012869,0.04554 c -0.297959,1.111998 -0.00408,2.562 1.7313817,3.027014 3.5585897,0.469259 5.5926925,0.859693 6.3056986,1.732766 C 5.7591184,20.532715 5.1589508,21.957408 8,23 h 8 c 3.86,0 7,-3.14 7,-7 V 12.03125 L 24.859214,8.6615407 C 25.525878,7.4532531 25.139265,5.9364771 23.94415,5.2464771 Z";
        const PATH_GRAB = "m 18.5,7.080786 c -1.38,0 -2.5,1.12 -2.5,2.5 V 11 H 15.5 V 8.3105816 c 0,-1.38 -1.12,-2.5 -2.5,-2.5 -1.38,0 -2.5,1.12 -2.5,2.5 V 11 H 10 V 9.2928981 C 10,7.9128983 8.88,6.7928983 7.5,6.7928983 c -1.38,0 -2.5,1.12 -2.5,2.4999998 V 14 l -0.6452261,0.04463 c -1.3435623,-0.0275 -2.2803811,0.362565 -2.8133152,1.602424 l -0.08,0.21 c -0.34,0.93 -0.1734222,2.257415 0.6065777,2.867415 L 8,23 h 8 c 3.86,0 7,-3.14 7,-7 V 9.580786 c 0,-1.38 -1.12,-2.5 -2.5,-2.5 z";
        const PATH_SQUEEZED = "M 32.588701,17.530003 C 32.71581,16.155869 31.929267,16.016137 30.559872,15.84538 l -2.272902,-0.283419 -3.727789,0.306818 0.01823,-0.22857 4.405618,-0.07464 4.072348,0.01782 c 1.379987,0.006 2.461122,-0.201853 2.565976,-1.577864 0.104854,-1.37601 -0.929461,-2.547516 -2.302821,-2.682726 l -3.670952,0.08827 -5.14746,-0.332692 -0.0037,-0.218719 3.874048,0.519648 3.015712,-0.597176 C 32.739885,10.514053 33.481515,9.0174791 33.101815,7.6907434 32.722114,6.3640078 31.483802,6.1135862 30.143368,6.4416649 l -3.301713,0.9108304 c 0,0 -1.805992,-0.4677483 -2.706848,-0.4992353 C 23.23395,6.821774 21.495662,7.1514451 21.495662,7.1514451 L 21.490162,6.6942607 24.540456,6.41754 c 1.384992,-0.3963728 2.105438,-1.6069039 1.706256,-3.0017092 l -0.0124,-0.04567 C 25.917511,2.2633695 24.931336,1.8783301 23.204005,2.3726776 21.305504,3.8058614 19.139129,5.2027277 17.590519,5.8497136 16.645525,6.2445182 15.867283,7.143715 15.174961,7.3656263 13.651678,7.8538867 12.709088,7.7016847 12.485691,10.328583 l 0.0945,5.577404 c 0.06539,3.859446 5.765984,2.922698 9.513368,3.186186 l 5.149688,0.362088 c 0.800695,0.155609 -0.0796,0.03471 1.717174,0.478431 1.339752,0.330854 3.353163,0.571557 3.474319,-0.73823 zM 32.588701,17.530003 C 32.71581,16.155869 31.929267,16.016137 30.559872,15.84538 l -2.272902,-0.283419 -3.727789,0.306818 0.01823,-0.22857 4.405618,-0.07464 4.072348,0.01782 c 1.379987,0.006 2.461122,-0.201853 2.565976,-1.577864 0.104854,-1.37601 -0.929461,-2.547516 -2.302821,-2.682726 l -3.670952,0.08827 -5.14746,-0.332692 -0.0037,-0.218719 3.874048,0.519648 3.015712,-0.597176 C 32.739885,10.514053 33.481515,9.0174791 33.101815,7.6907434 32.722114,6.3640078 31.483802,6.1135862 30.143368,6.4416649 l -3.301713,0.9108304 c 0,0 -1.805992,-0.4677483 -2.706848,-0.4992353 C 23.23395,6.821774 21.495662,7.1514451 21.495662,7.1514451 L 21.490162,6.6942607 24.540456,6.41754 c 1.384992,-0.3963728 2.105438,-1.6069039 1.706256,-3.0017092 l -0.0124,-0.04567 C 25.917511,2.2633695 24.931336,1.8783301 23.204005,2.3726776 21.305504,3.8058614 19.139129,5.2027277 17.590519,5.8497136 16.645525,6.2445182 15.781702,6.9651015 15.174961,7.3656263 14.372996,7.8950239 10.287552,8.3154721 6.6745667,7.942865 4.6824303,7.7374159 3.1002896,6.4860007 1.7586891,6.4885192 -1.292048,6.4942461 -0.74285159,9.4153638 -0.81675532,10.284389 l 0.0945,5.577404 c 0.0170358,1.005458 0.30290373,3.235194 2.37433842,3.258136 1.6643807,0.01843 3.3306715,-0.891605 5.6400125,-0.876359 5.7120044,0.03771 12.8281474,0.709854 14.8014634,0.848603 l 5.149688,0.362088 c 0.800695,0.155609 -0.0796,0.03471 1.717174,0.478431 1.339752,0.330854 3.353163,0.571557 3.474319,-0.73823 z";

        // --- SYNTHESIZED AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function createNoiseBuffer(durationSec) {
            const bufferSize = audioCtx.sampleRate * durationSec;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            return buffer;
        }

        function playSlapSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = createNoiseBuffer(0.1);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            // Randomize pitch and resonance for organic squish
            filter.frequency.value = 800 + (Math.random() * 200 - 100);
            filter.Q.value = 1.5 + (Math.random() * 0.6 - 0.3);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1 + (Math.random() * 0.04 - 0.02));

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start();
        }

        function playHighFiveSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const noise = audioCtx.createBufferSource();
            noise.buffer = createNoiseBuffer(0.3);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            // Randomize high-five pitch
            filter.frequency.value = 1500 + (Math.random() * 400 - 200);
            filter.Q.value = 1 + Math.random();
            const gain = audioCtx.createGain();
            
            const vol = 1 + (Math.random() * 0.2 - 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.1 * vol, audioCtx.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(1.2 * vol, audioCtx.currentTime + 0.06);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2 + (Math.random()*0.05));

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // --- GAME CORE ---
        const GameState = {
            isHost: false,
            myId: null,
            roomId: null,
            isInGame: false,
            isClickedIn: false,
            peers: {}, 
            localPos: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
            lastSentMouse: { x: 0, y: 0 },
            localCursorEl: null,
            
            localShape: PATH_POINTER, // Tracks current local icon shape
            lastLocalPosX: null,
            lastLocalPosY: null,
            baseZ: {}, 
            currentZMap: {}, 
            overlaps: {}, // Locks Z layer relationships when standing still
            activeDrags: {},
            slapCombos: {}, 
            hfCombos: {} 
        };

        let peer = null;
        let hostConnection = null; 
        let clientConnections = {}; 

        const SEND_RATE = 1000 / 60; 
        const LERP_SPEED = 0.8; 
        const HIT_RADIUS = 35; // pixels

        let interactingPeer = null;
        let isDragging = false;
        let dragStartPos = { x: 0, y: 0 };
        let mouseDownTime = 0;
        let recentHits = {}; 
        let pendingHitTimeout = null;

        // Distinct, vibrant color palette ensuring hands are easily distinguishable
        const CURSOR_COLORS = [
            '#ef4444', '#f97316', '#eab308', '#22c55e', '#14b8a6', 
            '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#f43f5e'
        ];

        function getColorFromId(id) {
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
            return CURSOR_COLORS[Math.abs(hash) % CURSOR_COLORS.length];
        }

        function getComboColor(combo) {
            if (combo === 1) return 'rgb(255, 255, 255)';
            if (combo <= 10) {
                const p = (combo - 1) / 9;
                return `rgb(255, 255, ${Math.floor(255 - p*255)})`;
            }
            if (combo <= 25) {
                const p = (combo - 10) / 15;
                return `rgb(255, ${Math.floor(255 - p*255)}, 0)`;
            }
            if (combo <= 100) {
                const p = (combo - 25) / 75;
                return `rgb(${Math.floor(255 - p*(255-173))}, ${Math.floor(p*216)}, ${Math.floor(p*230)})`;
            }
            if (combo < 1000) {
                const p = Math.min(1, (combo - 100) / 400);
                return `rgb(${Math.floor(173 - p*(173-128))}, ${Math.floor(216 - p*216)}, ${Math.floor(230 - p*(230-128))})`;
            }
            return 'rgb(128, 0, 128)';
        }

        function promoteZ(actorId, targetId) {
            if (!GameState.baseZ[actorId]) GameState.baseZ[actorId] = 100;
            if (!GameState.baseZ[targetId]) GameState.baseZ[targetId] = 100;
            
            if (GameState.baseZ[actorId] <= GameState.baseZ[targetId]) {
                GameState.baseZ[actorId] = GameState.baseZ[targetId] + 1;
            }
        }

        function enterGame() {
            GameState.isInGame = true;
            lobbyEl.classList.add('hidden-fade');
            setTimeout(() => lobbyEl.style.display = 'none', 200);
            gameUiEl.classList.remove('hidden');
            document.getElementById('display-room-id').innerText = GameState.roomId;
            document.getElementById('click-prompt').style.display = 'flex';
            
            GameState.baseZ[GameState.myId] = 100;

            requestAnimationFrame(renderLoop);
            setInterval(networkTick, SEND_RATE);
        }

        function createCursorElement(id, isLocal = false) {
            const color = getColorFromId(id);
            const el = document.createElement('div');
            el.className = 'cursor-entity';
            
            const facingClass = 'facing-left'; 
            const spriteId = isLocal ? 'sprite-local' : 'sprite-' + id;
            
            if (!isLocal && GameState.peers[id]) {
                GameState.peers[id].currentShape = PATH_POINTER;
            }

            el.innerHTML = `
                <div class="cursor-sprite-wrapper" id="${spriteId}">
                    <svg class="cursor-icon ${facingClass}" viewBox="0 0 24 24" fill="${color}" xmlns="http://www.w3.org/2000/svg">
                        <path d="${PATH_POINTER}" stroke="black" stroke-width="1" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="cursor-label" style="top: 25px; left: 15px; color: ${color};">
                    ${isLocal ? 'YOU' : id.substring(0, 5)}
                </div>
            `;
            document.getElementById('cursor-container').appendChild(el);
            return el;
        }

        // Highly optimized shape swapping function
        function setHandShape(id, shapePath) {
            if (id === GameState.myId) {
                if (GameState.localShape === shapePath) return;
                GameState.localShape = shapePath;
            } else {
                if (GameState.peers[id] && GameState.peers[id].currentShape === shapePath) return;
                if (GameState.peers[id]) GameState.peers[id].currentShape = shapePath;
            }
            
            const spriteId = id === GameState.myId ? 'sprite-local' : 'sprite-' + id;
            const el = document.getElementById(spriteId);
            if (el) {
                const pathEl = el.querySelector('path');
                if (pathEl) pathEl.setAttribute('d', shapePath);
            }
        }

        const playAnim = (spriteEl, animClass) => {
            if (!spriteEl) return;
            spriteEl.classList.remove('anim-hf', 'anim-slap-strike', 'anim-slap-receive');
            void spriteEl.offsetWidth; 
            spriteEl.classList.add(animClass);
        };

        function showSlapText(x, y, combo, targetZIndex) {
            const textEl = document.createElement('div');
            
            // Randomize fly-out
            const angle = (Math.random() - 0.5) * Math.PI; 
            const dist = Math.random() * 40 + 30;
            textEl.style.setProperty('--dx', `${Math.sin(angle) * dist}px`);
            textEl.style.setProperty('--dy', `${-Math.cos(angle) * dist - 20}px`);

            textEl.className = 'absolute text-sm md:text-base font-black italic select-none pointer-events-none drop-shadow-md';
            textEl.style.left = x + 'px';
            textEl.style.top = y + 'px';
            textEl.style.zIndex = targetZIndex + 1;

            if (combo >= 1000) {
                textEl.innerText = 'SLAPAFICATION!!!!';
                textEl.className = 'absolute text-xl md:text-2xl font-black italic select-none pointer-events-none drop-shadow-2xl';
                textEl.style.backgroundImage = 'linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)';
                textEl.style.webkitBackgroundClip = 'text';
                textEl.style.color = 'transparent';
                textEl.style.animation = 'slapTextAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, rainbowText 0.5s linear infinite';
            } else {
                textEl.innerText = combo > 1 ? `SLAP! x${combo}` : 'SLAP!';
                textEl.style.color = getComboColor(combo);
                textEl.style.textShadow = '2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000';
                textEl.style.animation = 'slapTextAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            }
            
            document.body.appendChild(textEl);
            setTimeout(() => textEl.remove(), 800);
        }

        function showScorePop(x, y, diff, combo, targetZIndex) {
            const scoreEl = document.createElement('div');
            
            const angle = (Math.random() - 0.5) * Math.PI; 
            const dist = Math.random() * 40 + 30;
            scoreEl.style.setProperty('--dx', `${Math.sin(angle) * dist}px`);
            scoreEl.style.setProperty('--dy', `${-Math.cos(angle) * dist - 20}px`);

            scoreEl.className = 'absolute text-xs md:text-sm font-black italic select-none pointer-events-none drop-shadow-md';
            scoreEl.style.left = x + 'px';
            scoreEl.style.top = y + 'px';
            scoreEl.style.zIndex = targetZIndex + 1;
            
            let evalText;
            if (diff <= 50) evalText = 'PERFECT!'; 
            else if (diff <= 150) evalText = 'GREAT!'; 
            else if (diff <= 300) evalText = 'GOOD'; 
            else evalText = 'SLOW'; 
            
            if (combo >= 1000) {
                scoreEl.innerText = 'HIGHFIVIFICATION!!!!';
                scoreEl.className = 'absolute text-lg md:text-xl font-black italic select-none pointer-events-none drop-shadow-2xl';
                scoreEl.style.backgroundImage = 'linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)';
                scoreEl.style.webkitBackgroundClip = 'text';
                scoreEl.style.color = 'transparent';
                scoreEl.style.animation = 'slapTextAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, rainbowText 0.5s linear infinite';
            } else {
                scoreEl.innerText = combo > 1 ? `${evalText} x${combo} (${diff}ms)` : `${evalText} (${diff}ms)`;
                scoreEl.style.color = getComboColor(combo);
                scoreEl.style.textShadow = '2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000';
                scoreEl.style.animation = 'slapTextAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            }

            document.body.appendChild(scoreEl);
            setTimeout(() => scoreEl.remove(), 800);
        }

        function executeSlapVisuals(slapperId, slappedId) {
            const now = Date.now();
            let comboInfo = GameState.slapCombos[slapperId] || { count: 0, lastTime: 0 };
            
            if (now - comboInfo.lastTime <= 500) {
                comboInfo.count++;
            } else {
                comboInfo.count = 1;
            }
            comboInfo.lastTime = now;
            GameState.slapCombos[slapperId] = comboInfo;

            promoteZ(slapperId, slappedId);

            const slapperEl = document.getElementById(slapperId === GameState.myId ? 'sprite-local' : 'sprite-' + slapperId);
            const slappedEl = document.getElementById(slappedId === GameState.myId ? 'sprite-local' : 'sprite-' + slappedId);
            
            playAnim(slapperEl, 'anim-slap-strike');
            setHandShape(slapperId, PATH_SLAP_STRIKE);
            setTimeout(() => setHandShape(slapperId, PATH_POINTER), 300);

            playAnim(slappedEl, 'anim-slap-receive');
            setHandShape(slappedId, PATH_JAZZ_HAND);
            setTimeout(() => setHandShape(slappedId, PATH_POINTER), 400);
            
            playSlapSound();

            let targetX = GameState.peers[slappedId] ? GameState.peers[slappedId].renderX : GameState.localPos.x;
            let targetY = GameState.peers[slappedId] ? GameState.peers[slappedId].renderY : GameState.localPos.y;
            
            let tz = GameState.currentZMap[slappedId] || 100;
            let sz = GameState.currentZMap[slapperId] || 100;
            let textZ = Math.floor((tz + sz) / 2); 

            showSlapText(targetX, targetY, comboInfo.count, textZ);
        }

        function executeHighFiveVisuals(initiatorId, targetId, diff) {
            const now = Date.now();
            let comboInfo = GameState.hfCombos[initiatorId] || { count: 0, lastTime: 0 };
            
            if (now - comboInfo.lastTime <= 500) {
                comboInfo.count++;
            } else {
                comboInfo.count = 1;
            }
            comboInfo.lastTime = now;
            GameState.hfCombos[initiatorId] = comboInfo;

            promoteZ(initiatorId, targetId);

            const initiatorEl = document.getElementById(initiatorId === GameState.myId ? 'sprite-local' : 'sprite-' + initiatorId);
            const targetEl = document.getElementById(targetId === GameState.myId ? 'sprite-local' : 'sprite-' + targetId);
            
            playAnim(initiatorEl, 'anim-hf');
            playAnim(targetEl, 'anim-hf');
            
            setHandShape(initiatorId, PATH_SLAP_STRIKE);
            setTimeout(() => setHandShape(initiatorId, PATH_POINTER), 300);
            setHandShape(targetId, PATH_SLAP_STRIKE);
            setTimeout(() => setHandShape(targetId, PATH_POINTER), 300);

            playHighFiveSound();

            let targetX = GameState.peers[targetId] ? GameState.peers[targetId].renderX : GameState.localPos.x;
            let targetY = GameState.peers[targetId] ? GameState.peers[targetId].renderY : GameState.localPos.y;
            
            let tz = GameState.currentZMap[targetId] || 100;
            let sz = GameState.currentZMap[initiatorId] || 100;
            let textZ = Math.floor((tz + sz) / 2); 

            showScorePop(targetX, targetY, diff, comboInfo.count, textZ);
        }

        // --- INTERACTION / DRAG & HIT LOGIC ---
        window.addEventListener('mousedown', (e) => {
            if (!GameState.isClickedIn) return;

            const now = Date.now();
            let brokeFree = false;

            for (let draggerId in GameState.activeDrags) {
                if (GameState.activeDrags[draggerId].target === GameState.myId && (now - GameState.activeDrags[draggerId].time <= 150)) {
                    executeSlapVisuals(GameState.myId, draggerId);
                    broadcastData({ t: 'event', type: 'break_free', from: GameState.myId, to: draggerId });
                    delete GameState.activeDrags[draggerId];
                    brokeFree = true;
                }
            }

            if (brokeFree) return;

            let hitId = null;
            let minDist = HIT_RADIUS;
            
            for (let id in GameState.peers) {
                let p = GameState.peers[id];
                let dx = p.renderX - GameState.localPos.x;
                let dy = p.renderY - GameState.localPos.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist) {
                    minDist = dist;
                    hitId = id;
                }
            }

            if (hitId) {
                interactingPeer = hitId;
                isDragging = false;
                mouseDownTime = Date.now();
                dragStartPos = { x: GameState.localPos.x, y: GameState.localPos.y };
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                GameState.localPos.x += e.movementX;
                GameState.localPos.y += e.movementY;
                GameState.localPos.x = Math.max(0, Math.min(window.innerWidth, GameState.localPos.x));
                GameState.localPos.y = Math.max(0, Math.min(window.innerHeight, GameState.localPos.y));

                if (interactingPeer) {
                    const dist = Math.sqrt(Math.pow(GameState.localPos.x - dragStartPos.x, 2) + Math.pow(GameState.localPos.y - dragStartPos.y, 2));
                    if (dist > 5 && !isDragging) {
                        isDragging = true;
                        setHandShape(GameState.myId, PATH_GRAB);
                        setHandShape(interactingPeer, PATH_SQUEEZED);
                    }
                }
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (!GameState.isClickedIn || !interactingPeer) return;

            const now = Date.now();
            const targetId = interactingPeer;

            if (isDragging || (now - mouseDownTime > 300)) {
                if (isDragging) {
                    setHandShape(GameState.myId, PATH_POINTER);
                    setHandShape(interactingPeer, PATH_POINTER);
                }
            } else {
                promoteZ(GameState.myId, targetId); 

                if (recentHits[targetId] && (now - recentHits[targetId] <= 300)) {
                    const diff = now - recentHits[targetId];
                    executeHighFiveVisuals(GameState.myId, targetId, diff);
                    broadcastData({ t: 'event', type: 'highfive_confirm', from: GameState.myId, to: targetId, diff: diff });
                    delete recentHits[targetId];
                } else {
                    broadcastData({ t: 'event', type: 'hit', from: GameState.myId, to: targetId });
                    
                    pendingHitTimeout = setTimeout(() => {
                        executeSlapVisuals(GameState.myId, targetId);
                        broadcastData({ t: 'event', type: 'slap_execute', from: GameState.myId, to: targetId });
                    }, 200); 
                }
            }

            interactingPeer = null;
            isDragging = false;
        });

        // --- NETWORK CORE ---
        function broadcastData(payload) {
            if (GameState.isHost) {
                for (let id in clientConnections) {
                    if (clientConnections[id].open) clientConnections[id].send(payload);
                }
            } else if (hostConnection && hostConnection.open) {
                hostConnection.send(payload);
            }
        }

        function updateRemoteCursor(id, x, y) {
            const targetX = x * window.innerWidth;
            const targetY = y * window.innerHeight;

            if (!GameState.peers[id]) {
                GameState.peers[id] = {
                    targetX: targetX,
                    targetY: targetY,
                    renderX: targetX,
                    renderY: targetY,
                    element: createCursorElement(id),
                    currentShape: PATH_POINTER
                };
                if (!GameState.baseZ[id]) GameState.baseZ[id] = 100;
                document.getElementById('player-count').innerText = Object.keys(GameState.peers).length + 1;
            } else {
                const p = GameState.peers[id];
                p.targetX = targetX;
                p.targetY = targetY;
            }
        }

        function renderLoop() {
            const now = Date.now();
            
            for (let dId in GameState.activeDrags) {
                if (now - GameState.activeDrags[dId].time > 150) {
                    setHandShape(dId, PATH_POINTER);
                    setHandShape(GameState.activeDrags[dId].target, PATH_POINTER);
                    delete GameState.activeDrags[dId];
                }
            }

            let speeds = {};
            speeds[GameState.myId] = Math.hypot(GameState.localPos.x - (GameState.lastLocalPosX || GameState.localPos.x), GameState.localPos.y - (GameState.lastLocalPosY || GameState.localPos.y));
            GameState.lastLocalPosX = GameState.localPos.x;
            GameState.lastLocalPosY = GameState.localPos.y;
            
            for (let id in GameState.peers) {
                const p = GameState.peers[id];
                speeds[id] = Math.hypot(p.targetX - (p.lastTargetX || p.targetX), p.targetY - (p.lastTargetY || p.targetY));
                p.lastTargetX = p.targetX;
                p.lastTargetY = p.targetY;
            }

            const allIds = [GameState.myId, ...Object.keys(GameState.peers)];
            for (let i = 0; i < allIds.length; i++) {
                for (let j = i + 1; j < allIds.length; j++) {
                    const idA = allIds[i];
                    const idB = allIds[j];
                    const posA = idA === GameState.myId ? GameState.localPos : {x: GameState.peers[idA].renderX, y: GameState.peers[idA].renderY};
                    const posB = idB === GameState.myId ? GameState.localPos : {x: GameState.peers[idB].renderX, y: GameState.peers[idB].renderY};
                    
                    const dist = Math.hypot(posA.x - posB.x, posA.y - posB.y);
                    const pairKey = idA < idB ? idA + '|' + idB : idB + '|' + idA;
                    
                    if (dist < 40) {
                        if (!GameState.overlaps[pairKey]) {
                            GameState.overlaps[pairKey] = true;
                            if (speeds[idA] > speeds[idB] + 0.5) promoteZ(idA, idB);
                            else if (speeds[idB] > speeds[idA] + 0.5) promoteZ(idB, idA);
                        }
                    } else {
                        delete GameState.overlaps[pairKey];
                    }
                }
            }

            let maxBaseZ = 100;
            for (let id in GameState.baseZ) {
                maxBaseZ = Math.max(maxBaseZ, GameState.baseZ[id]);
            }

            let zMap = {};
            for (let id in GameState.peers) zMap[id] = (GameState.baseZ[id] || 100) * 10;
            zMap[GameState.myId] = (GameState.baseZ[GameState.myId] || 100) * 10;

            for (let draggerId in GameState.activeDrags) {
                let draggedId = GameState.activeDrags[draggerId].target;
                let dragLayer = 10000 + (GameState.baseZ[draggedId] || 100) * 10;
                
                zMap[draggedId] = dragLayer;
                zMap[draggerId] = dragLayer + 5; 
            }
            
            GameState.currentZMap = zMap; 

            if (GameState.localCursorEl) {
                GameState.localCursorEl.style.zIndex = zMap[GameState.myId];
                GameState.localCursorEl.style.transform = `translate3d(${GameState.localPos.x}px, ${GameState.localPos.y}px, 0)`;
            }

            for (let id in GameState.peers) {
                const p = GameState.peers[id];
                p.element.style.zIndex = zMap[id];
                p.renderX += (p.targetX - p.renderX) * LERP_SPEED;
                p.renderY += (p.targetY - p.renderY) * LERP_SPEED;
                p.element.style.transform = `translate3d(${p.renderX}px, ${p.renderY}px, 0)`;
            }
            
            requestAnimationFrame(renderLoop);
        }

        function networkTick() {
            if (!GameState.isClickedIn || !GameState.isInGame) return;

            const xNorm = GameState.localPos.x / window.innerWidth;
            const yNorm = GameState.localPos.y / window.innerHeight;

            if (isDragging && interactingPeer) {
                promoteZ(GameState.myId, interactingPeer);
                GameState.activeDrags[GameState.myId] = { target: interactingPeer, time: Date.now() };

                if (GameState.peers[interactingPeer]) {
                    GameState.peers[interactingPeer].targetX = GameState.localPos.x;
                    GameState.peers[interactingPeer].targetY = GameState.localPos.y;
                }

                broadcastData({
                    t: 'event', type: 'drag', dragger: GameState.myId, dragged: interactingPeer,
                    x: parseFloat(xNorm.toFixed(5)), y: parseFloat(yNorm.toFixed(5))
                });
            }

            if (xNorm === GameState.lastSentMouse.x && yNorm === GameState.lastSentMouse.y) return;

            broadcastData({
                t: 'c', id: GameState.myId,
                x: parseFloat(xNorm.toFixed(5)), y: parseFloat(yNorm.toFixed(5))
            });

            GameState.lastSentMouse.x = xNorm;
            GameState.lastSentMouse.y = yNorm;
        }

        // --- POINTER LOCK & TAB TOGGLE ---
        const lobbyEl = document.getElementById('lobby');
        const gameUiEl = document.getElementById('game-ui');
        const clickPrompt = document.getElementById('click-prompt');

        let tabDownTime = 0;
        let labelsToggled = false;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && GameState.isClickedIn) {
                e.preventDefault();
                if (!e.repeat) {
                    tabDownTime = Date.now();
                    document.body.classList.add('labels-visible');
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'Tab' && GameState.isClickedIn) {
                e.preventDefault();
                if (Date.now() - tabDownTime < 300) {
                    labelsToggled = !labelsToggled;
                }
                
                if (!labelsToggled) {
                    document.body.classList.remove('labels-visible');
                } else {
                    document.body.classList.add('labels-visible');
                }
            }
        });

        window.addEventListener('blur', () => {
            labelsToggled = false;
            document.body.classList.remove('labels-visible');
        });

        clickPrompt.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement) {
                GameState.isClickedIn = true;
                clickPrompt.style.display = 'none';
                gameUiEl.classList.add('hidden');
                if (!GameState.localCursorEl) {
                    GameState.localCursorEl = createCursorElement(GameState.myId, true);
                }
            } else {
                GameState.isClickedIn = false;
                if (GameState.isInGame) {
                    clickPrompt.style.display = 'flex';
                    gameUiEl.classList.remove('hidden');
                }
            }
        });

        window.addEventListener('resize', () => {
            for (let id in GameState.peers) {
                const p = GameState.peers[id];
                const xNorm = p.targetX / (window.innerWidth || 1);
                const yNorm = p.targetY / (window.innerHeight || 1);
                p.targetX = xNorm * window.innerWidth;
                p.targetY = yNorm * window.innerHeight;
            }
        });

        // --- PEER.JS INITIALIZATION & EVENT RELAY ---
        function initPeer(onReady) {
            document.getElementById('action-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            peer = new Peer(null, { debug: 1 });
            peer.on('open', (id) => {
                GameState.myId = id;
                onReady(id);
            });
            peer.on('error', (err) => {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('action-state').classList.remove('hidden');
                document.getElementById('error-msg').innerText = "Error: " + err.type;
            });
        }

        document.getElementById('btn-host').addEventListener('click', () => {
            initPeer((id) => {
                GameState.isHost = true;
                GameState.roomId = id;
                peer.on('connection', (conn) => {
                    clientConnections[conn.peer] = conn;
                    conn.on('data', (data) => {
                        if (data.t === 'c') {
                            updateRemoteCursor(data.id, data.x, data.y);
                        } else if (data.t === 'event') {
                            if (data.type === 'hit') {
                                promoteZ(data.from, data.to);
                                if (data.to === GameState.myId) recentHits[data.from] = Date.now();
                            } else if (data.type === 'highfive_confirm' && data.to === GameState.myId) {
                                clearTimeout(pendingHitTimeout);
                                executeHighFiveVisuals(data.from, GameState.myId, data.diff);
                            } else if (data.type === 'slap_execute' && data.to === GameState.myId) {
                                executeSlapVisuals(data.from, GameState.myId);
                            } else if (data.type === 'drag') {
                                promoteZ(data.dragger, data.dragged);
                                GameState.activeDrags[data.dragger] = { target: data.dragged, time: Date.now() };

                                setHandShape(data.dragger, PATH_GRAB);
                                setHandShape(data.dragged, PATH_SQUEEZED);

                                if (data.dragged === GameState.myId) {
                                    GameState.localPos.x = data.x * window.innerWidth;
                                    GameState.localPos.y = data.y * window.innerHeight;
                                } else if (GameState.peers[data.dragged]) {
                                    GameState.peers[data.dragged].targetX = data.x * window.innerWidth;
                                    GameState.peers[data.dragged].targetY = data.y * window.innerHeight;
                                }
                            } else if (data.type === 'break_free') {
                                executeSlapVisuals(data.from, data.to);
                                delete GameState.activeDrags[data.to];
                                if (data.to === GameState.myId) {
                                    isDragging = false;
                                    interactingPeer = null;
                                }
                            }
                        }
                        
                        for (let otherId in clientConnections) {
                            if (otherId !== conn.peer && clientConnections[otherId].open) {
                                clientConnections[otherId].send(data);
                            }
                        }
                    });
                    conn.on('close', () => {
                        if(GameState.peers[conn.peer]) {
                            GameState.peers[conn.peer].element.remove();
                            delete GameState.peers[conn.peer];
                        }
                        document.getElementById('player-count').innerText = Object.keys(GameState.peers).length + 1;
                    });
                });
                enterGame();
            });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            const joinId = document.getElementById('input-room-id').value.trim();
            if (!joinId) return;
            initPeer((id) => {
                GameState.isHost = false;
                GameState.roomId = joinId;
                hostConnection = peer.connect(joinId, { reliable: false });
                hostConnection.on('open', () => enterGame());
                hostConnection.on('data', (data) => {
                    if (data.t === 'c' && data.id !== GameState.myId) {
                        updateRemoteCursor(data.id, data.x, data.y);
                    } else if (data.t === 'event') {
                        if (data.type === 'hit') {
                            promoteZ(data.from, data.to);
                            if (data.to === GameState.myId) recentHits[data.from] = Date.now();
                        } else if (data.type === 'highfive_confirm' && data.to === GameState.myId) {
                            clearTimeout(pendingHitTimeout);
                            executeHighFiveVisuals(data.from, GameState.myId, data.diff);
                        } else if (data.type === 'slap_execute' && data.to === GameState.myId) {
                            executeSlapVisuals(data.from, GameState.myId);
                        } else if (data.type === 'drag') {
                            promoteZ(data.dragger, data.dragged);
                            GameState.activeDrags[data.dragger] = { target: data.dragged, time: Date.now() };

                            setHandShape(data.dragger, PATH_GRAB);
                            setHandShape(data.dragged, PATH_SQUEEZED);

                            if (data.dragged === GameState.myId) {
                                GameState.localPos.x = data.x * window.innerWidth;
                                GameState.localPos.y = data.y * window.innerHeight;
                            } else if (GameState.peers[data.dragged]) {
                                GameState.peers[data.dragged].targetX = data.x * window.innerWidth;
                                GameState.peers[data.dragged].targetY = data.y * window.innerHeight;
                            }
                        } else if (data.type === 'break_free') {
                            executeSlapVisuals(data.from, data.to);
                            delete GameState.activeDrags[data.to];
                            if (data.to === GameState.myId) {
                                isDragging = false;
                                interactingPeer = null;
                            }
                        }
                    }
                });
            });
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            const ci = document.getElementById('icon-copy');
            const ck = document.getElementById('icon-check');
            navigator.clipboard.writeText(GameState.roomId).then(() => {
                ci.classList.add('hidden'); ck.classList.remove('hidden');
                setTimeout(() => { ci.classList.remove('hidden'); ck.classList.add('hidden'); }, 2000);
            });
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superpower RPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <h1>Superpower RPS</h1>
        
        <div id="lobby-screen" class="screen active">
            <div style="text-align: center; margin-top: 20px;">
                <input type="text" id="lobby-name-input" class="input-field" placeholder="Enter Your Name (Optional)" style="font-size: 1.2em; max-width: 300px;">
            </div>
            <div class="lobby-container">
                <div class="lobby-card">
                    <h2>Host a Game</h2>
                    <p class="lobby-desc">Share your code or link with a friend.</p>
                    <h1 id="my-id">Generating...</h1>
                    <div class="lobby-actions">
                        <button id="copy-id-btn" class="btn secondary">Copy ID</button>
                        <button id="copy-link-btn" class="btn primary">Copy Invite Link</button>
                    </div>
                </div>
                
                <div class="lobby-divider">OR</div>
                
                <div class="lobby-card">
                    <h2>Join a Game</h2>
                    <p class="lobby-desc">Enter a friend's Room ID to connect.</p>
                    <input type="text" id="join-id" class="input-field" placeholder="Enter Host ID">
                    <div class="lobby-actions">
                        <button id="join-btn" class="btn primary" style="width: 100%;">Connect</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <!-- Opponent Area (Top) -->
            <div class="player-zone opponent-zone">
                <div class="player-info">
                    <h2 id="enemy-name-display">Opponent</h2>
                    <div id="enemy-score-dots" class="score-dots"></div>
                </div>
                <div class="cards-display" id="enemy-cards-list"></div>
            </div>

            <!-- Center Area (Status, RPS, Draft, Log) -->
            <div class="center-zone">
                <h3 id="turn-status">Waiting...</h3>

                <button id="return-draft-btn" class="btn primary hidden pop-in">Return to Draft</button>

                <div class="center-top-space">
                    <div id="enemy-clash-icon" class="clash-icon hidden"></div>
                </div>

                <div id="history-container" class="history-container"></div>

                <div class="center-bottom-space">
                    <div id="my-clash-icon" class="clash-icon hidden"></div>
                    <div id="rps-area" class="hidden">
                        <button class="rps-btn pop-in" data-choice="rock">
                            <svg viewBox="0 0 24 24"><path d="M19.5 9.5c0-.83-.67-1.5-1.5-1.5h-1.5V6.5c0-.83-.67-1.5-1.5-1.5h-1.5V3.5c0-.83-.67-1.5-1.5-1.5S10.5 2.67 10.5 3.5v5H9V7.5C9 6.67 8.33 6 7.5 6S6 6.67 6 7.5v3.68c-.96.2-1.93.59-2.73 1.15-.65.45-.88 1.35-.45 2.02l2.67 4.14c1.1 1.7 2.97 2.72 5 2.76h4.5c2.76 0 5-2.24 5-5v-6.75z"/></svg><span>Rock</span>
                        </button>
                        <button class="rps-btn pop-in" data-choice="paper">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span>Paper</span>
                        </button>
                        <button class="rps-btn pop-in" data-choice="scissors">
                            <svg viewBox="0 0 24 24"><path d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1l-9.64-9.64zM6 8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3h-3z"/></svg><span>Scissors</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Player Area (Bottom) -->
            <div class="player-zone my-zone">
                <div class="cards-display" id="my-cards-list"></div>
                <div class="player-info">
                    <input type="text" id="my-name-display" class="player-name-input" value="You" placeholder="You">
                    <div id="my-score-dots" class="score-dots"></div>
                </div>
            </div>
        </div>

        <!-- Fullscreen Draft Overlay -->
        <div id="draft-area" class="overlay hidden">
            <h2 class="draft-title">Select a superpower card:</h2>
            <div id="draft-options" class="card-container"></div>
            <div class="draft-actions">
                <button id="hide-draft-btn" class="btn secondary">Hide (Peek at Game)</button>
                <button id="skip-draft-btn" class="btn danger">Skip Draft</button>
            </div>
        </div>

        <!-- Fullscreen Card Modal -->
        <div id="card-modal" class="modal hidden" onclick="closeCardModal()">
            <div class="modal-content pop-in" onclick="event.stopPropagation()">
                <h2 id="modal-title"></h2>
                <img id="modal-art" src="" alt="Art" />
                <p id="modal-effect"></p>
                <button class="close-btn" onclick="closeCardModal()">Close</button>
            </div>
        </div>

        <!-- End Game Modal -->
        <div id="end-modal" class="modal hidden">
            <div class="modal-content pop-in">
                <h2>Game Over</h2>
                <p id="end-message"></p>
                <button id="restart-btn" class="close-btn">Restart Match</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
